<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Canvas" />
  <title>Canvas — Drawing App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1814;
      --surface: #242018;
      --border: rgba(255,255,255,0.08);
      --text: #e8e0d0;
      --muted: #7a7060;
      --accent: #d4a853;
      --accent2: #8fb89a;
      --danger: #c4614a;
      --toolbar-w: 72px;
      --toolbar-gap: 16px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--text);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Canvas ── */
    #canvas-wrap {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: fixed;
      left: var(--toolbar-gap);
      top: 50%;
      transform: translateY(-50%);
      width: var(--toolbar-w);
      background: rgba(26,24,20,0.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05) inset;
      z-index: 100;
    }

    .tb-sep {
      width: 36px;
      height: 1px;
      background: var(--border);
      margin: 4px 0;
      flex-shrink: 0;
    }

    .tb-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      position: relative;
      flex-shrink: 0;
    }

    .tb-btn:active { transform: scale(0.9); }
    .tb-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .tb-btn.active {
      background: rgba(212,168,83,0.15);
      color: var(--accent);
    }
    .tb-btn svg { width: 22px; height: 22px; }

    /* Tooltip */
    .tb-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%);
      background: rgba(26,24,20,0.95);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      padding: 5px 10px;
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
    }
    .tb-btn:hover::after { opacity: 1; }

    /* ── Top Bar ── */
    #topbar {
      position: fixed;
      top: var(--toolbar-gap);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,24,20,0.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      z-index: 100;
    }

    .app-name {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 17px;
      letter-spacing: 0.02em;
      color: var(--text);
      opacity: 0.9;
    }

    .top-sep { width: 1px; height: 20px; background: var(--border); }

    #size-slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .size-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      width: 28px;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 110px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(212,168,83,0.2);
    }

    /* Color swatches */
    #color-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .swatch:active { transform: scale(0.85); }
    .swatch.active { border-color: white; transform: scale(1.15); }

    #color-picker-wrap {
      position: relative;
      width: 28px;
      height: 28px;
    }
    #color-picker-wrap label {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
      border: 2px solid rgba(255,255,255,0.2);
      transition: transform 0.15s;
    }
    #color-picker-wrap label:hover { transform: scale(1.1); }
    #color-picker-wrap input[type=color] {
      position: absolute;
      width: 0; height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Bottom bar ── */
    #bottombar {
      position: fixed;
      bottom: var(--toolbar-gap);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,24,20,0.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0 18px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      z-index: 100;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    #pressure-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.1s, transform 0.1s;
    }

    #status-text { min-width: 120px; }

    /* ── Panels ── */
    .panel {
      position: fixed;
      background: rgba(26,24,20,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      z-index: 200;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      display: none;
    }
    .panel.open { display: block; }

    /* ── Canvas BG picker ── */
    #bg-panel {
      left: calc(var(--toolbar-w) + var(--toolbar-gap) * 2 + 4px);
      top: 50%;
      transform: translateY(-50%);
    }
    #bg-panel h3 {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .bg-grid {
      display: grid;
      grid-template-columns: repeat(4, 36px);
      gap: 8px;
    }
    .bg-swatch {
      width: 36px; height: 36px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .bg-swatch:hover { transform: scale(1.08); }
    .bg-swatch.active { border-color: var(--accent); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(26,24,20,0.96);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 100px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 300;
      letter-spacing: 0.04em;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Brush preview dot ── */
    #brush-preview {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 150;
      transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s;
      mix-blend-mode: difference;
      border: 1.5px solid rgba(255,255,255,0.6);
      background: transparent;
      display: none;
    }
  </style>
</head>
<body>

<!-- Canvas -->
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<!-- Brush preview -->
<div id="brush-preview"></div>

<!-- Top Bar -->
<div id="topbar">
  <span class="app-name">Canvas</span>
  <div class="top-sep"></div>
  <div id="size-slider-wrap">
    <span class="size-label" id="size-val">4</span>
    <input type="range" id="size-slider" min="1" max="80" value="4" step="1" />
  </div>
  <div class="top-sep"></div>
  <div id="color-row">
    <!-- Swatches filled by JS -->
  </div>
</div>

<!-- Left Toolbar -->
<div id="toolbar">
  <!-- Tools -->
  <button class="tb-btn active" id="btn-pen" data-tool="pen" data-tip="Pen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>
    </svg>
  </button>
  <button class="tb-btn" id="btn-pencil" data-tool="pencil" data-tip="Pencil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="2" x2="22" y2="6"/><path d="M7.5 20.5L19 9l-4-4L3.5 16.5 2 22z"/>
    </svg>
  </button>
  <button class="tb-btn" id="btn-marker" data-tool="marker" data-tip="Marker">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2H3v16h5.5l2.5 4 2.5-4H21V2z"/>
    </svg>
  </button>
  <button class="tb-btn" id="btn-brush" data-tool="brush" data-tip="Soft Brush">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1 1 2.25 2.02 3.98 2.02 2.23 0 4.02-1.8 4.02-4.02 0-1.64-1.35-3.04-3-3.04z"/>
    </svg>
  </button>
  <button class="tb-btn" id="btn-eraser" data-tool="eraser" data-tip="Eraser">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6.0 11.0 l7 7"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Canvas BG -->
  <button class="tb-btn" id="btn-bg" data-tip="Background">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Actions -->
  <button class="tb-btn" id="btn-undo" data-tip="Undo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
    </svg>
  </button>
  <button class="tb-btn" id="btn-redo" data-tip="Redo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/>
    </svg>
  </button>
  <button class="tb-btn" id="btn-clear" data-tip="Clear All" style="color:var(--danger)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Save -->
  <button class="tb-btn" id="btn-save" data-tip="Save PNG">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>
</div>

<!-- Background Panel -->
<div class="panel" id="bg-panel">
  <h3>Background</h3>
  <div class="bg-grid" id="bg-grid"></div>
</div>

<!-- Bottom Status Bar -->
<div id="bottombar">
  <div id="pressure-dot"></div>
  <span id="status-text">Apple Pencil ready</span>
  <div class="top-sep"></div>
  <span id="coords-text">—</span>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
(() => {
  'use strict';

  // ── Elements ──
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const wrap     = document.getElementById('canvas-wrap');
  const preview  = document.getElementById('brush-preview');
  const sizeSlider = document.getElementById('size-slider');
  const sizeVal    = document.getElementById('size-val');
  const colorRow   = document.getElementById('color-row');
  const bgGrid     = document.getElementById('bg-grid');
  const bgPanel    = document.getElementById('bg-panel');
  const statusText = document.getElementById('status-text');
  const coordsText = document.getElementById('coords-text');
  const pressureDot= document.getElementById('pressure-dot');
  const toast      = document.getElementById('toast');

  // ── State ──
  let tool        = 'pen';
  let color       = '#e8e0d0';
  let brushSize   = 4;
  let isDrawing   = false;
  let lastX       = 0, lastY = 0;
  let lastPressure= 0.5;
  let history     = [];
  let redoStack   = [];
  let bgColor     = '#1a1814';
  let activeSwatch = 0;
  let toastTimer  = null;

  const PALETTE = [
    '#e8e0d0', '#c4614a', '#d4a853', '#8fb89a',
    '#7aa3c8', '#a67cb0', '#5a8f7b', '#d4876a',
    '#1a1814', '#3d3830'
  ];

  const BG_COLORS = [
    { label: 'Ink',       color: '#1a1814' },
    { label: 'Parchment', color: '#f0e8d8' },
    { label: 'Slate',     color: '#2a2f38' },
    { label: 'Ivory',     color: '#faf6ef' },
    { label: 'Midnight',  color: '#0d0e14' },
    { label: 'Sand',      color: '#d8c9a8' },
    { label: 'Olive',     color: '#2d3020' },
    { label: 'Linen',     color: '#e8e0d0' },
  ];

  // ── Resize ──
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;
    // Save current drawing
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);
    fillBg();
    ctx.putImageData(img, 0, 0);
  }

  function fillBg() {
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  function initCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    fillBg();
    saveState();
  }

  // ── History ──
  function saveState() {
    history.push(canvas.toDataURL());
    if (history.length > 40) history.shift();
    redoStack = [];
  }

  function undo() {
    if (history.length < 2) return;
    redoStack.push(history.pop());
    restoreState(history[history.length - 1]);
  }

  function redo() {
    if (!redoStack.length) return;
    const state = redoStack.pop();
    history.push(state);
    restoreState(state);
  }

  function restoreState(dataURL) {
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = dataURL;
  }

  // ── Drawing ──
  function getToolSettings(pressure) {
    const sz = brushSize;
    switch (tool) {
      case 'pen':
        return {
          lineWidth:   sz * pressure * 1.2,
          globalAlpha: Math.min(0.98, 0.7 + pressure * 0.28),
          blur:        0,
          composite:   'source-over',
        };
      case 'pencil':
        return {
          lineWidth:   sz * pressure * 0.8 + 0.5,
          globalAlpha: Math.min(0.85, 0.35 + pressure * 0.5),
          blur:        0.5,
          composite:   'source-over',
          texture:     true,
        };
      case 'marker':
        return {
          lineWidth:   sz * 3 * (0.8 + pressure * 0.2),
          globalAlpha: 0.3,
          blur:        0,
          composite:   'source-over',
          cap:         'square',
        };
      case 'brush':
        return {
          lineWidth:   sz * pressure * 2.5,
          globalAlpha: Math.min(0.7, 0.15 + pressure * 0.55),
          blur:        sz * 0.6,
          composite:   'source-over',
        };
      case 'eraser':
        return {
          lineWidth:   sz * 3,
          globalAlpha: 1,
          blur:        0,
          composite:   'destination-out',
        };
      default:
        return { lineWidth: sz, globalAlpha: 1, blur: 0, composite: 'source-over' };
    }
  }

  function startStroke(x, y, pressure) {
    if (isDrawing) return;
    isDrawing = true;
    lastX = x; lastY = y;
    lastPressure = pressure || 0.5;
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function continueStroke(x, y, pressure) {
    if (!isDrawing) return;
    const p = pressure || 0.5;
    const settings = getToolSettings(p);

    ctx.save();
    ctx.globalCompositeOperation = settings.composite;
    ctx.globalAlpha = settings.globalAlpha;
    ctx.strokeStyle = tool === 'eraser' ? '#000' : color;
    ctx.lineWidth   = settings.lineWidth;
    ctx.lineCap     = settings.cap || 'round';
    ctx.lineJoin    = 'round';

    if (settings.blur > 0) {
      ctx.filter = `blur(${settings.blur}px)`;
    }

    // Smooth interpolation
    const mx = (lastX + x) / 2;
    const my = (lastY + y) / 2;

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.quadraticCurveTo(lastX, lastY, mx, my);
    ctx.stroke();

    // Pencil texture
    if (settings.texture && Math.random() > 0.6) {
      ctx.globalAlpha *= 0.4;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const ox = (Math.random() - 0.5) * settings.lineWidth * 1.5;
        const oy = (Math.random() - 0.5) * settings.lineWidth * 1.5;
        ctx.arc(mx + ox, my + oy, Math.random() * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }
    }

    ctx.restore();
    lastX = x; lastY = y;
    lastPressure = p;
  }

  function endStroke() {
    if (!isDrawing) return;
    isDrawing = false;
    ctx.beginPath();
    saveState();
  }

  // ── Pointer Events ──
  canvas.addEventListener('pointerdown', e => {
    // Palm rejection: ignore if not stylus or left mouse
    if (e.pointerType === 'touch' && e.isPrimary === false) return;
    // Allow finger drawing if no pencil connected, but prefer stylus
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);

    const { x, y } = getCanvasPos(e);
    const pressure = e.pressure > 0 ? e.pressure : 0.5;
    startStroke(x, y, pressure);
    updateStatus(e);
  }, { passive: false });

  canvas.addEventListener('pointermove', e => {
    e.preventDefault();
    const { x, y } = getCanvasPos(e);

    // Update brush preview cursor
    preview.style.display = 'block';
    preview.style.left = e.clientX + 'px';
    preview.style.top  = e.clientY + 'px';
    const previewSize = tool === 'eraser'
      ? brushSize * 3
      : tool === 'marker'
        ? brushSize * 3
        : Math.max(brushSize, 6);
    preview.style.width  = previewSize + 'px';
    preview.style.height = previewSize + 'px';

    coordsText.textContent = `${Math.round(x)} × ${Math.round(y)}`;

    if (!isDrawing) return;
    const pressure = e.pressure > 0 ? e.pressure : 0.5;
    continueStroke(x, y, pressure);
    updateStatus(e);
  }, { passive: false });

  canvas.addEventListener('pointerup', e => {
    e.preventDefault();
    endStroke();
    updateStatus(e, true);
  }, { passive: false });

  canvas.addEventListener('pointerleave', e => {
    preview.style.display = 'none';
    endStroke();
  });

  canvas.addEventListener('pointercancel', e => {
    endStroke();
  });

  // Prevent default touch behaviors (scrolling, zoom)
  document.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  document.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function updateStatus(e, ended = false) {
    const pressure = e.pressure || 0;
    const type     = e.pointerType;

    if (ended) {
      statusText.textContent = type === 'pen' ? 'Apple Pencil ready' : 'Ready';
      pressureDot.style.background = 'var(--muted)';
      pressureDot.style.transform  = 'scale(1)';
      return;
    }

    const label = type === 'pen' ? 'Pencil' : type === 'touch' ? 'Finger' : 'Mouse';
    const pct   = Math.round(pressure * 100);
    statusText.textContent = `${label} · ${pct}% pressure`;

    const s = 0.8 + pressure * 1.4;
    pressureDot.style.background = pressure > 0.5 ? 'var(--accent)' : 'var(--accent2)';
    pressureDot.style.transform  = `scale(${s})`;
  }

  // ── Color Palette ──
  function buildPalette() {
    colorRow.innerHTML = '';
    PALETTE.forEach((c, i) => {
      const s = document.createElement('button');
      s.className = 'swatch' + (i === 0 ? ' active' : '');
      s.style.background = c;
      s.title = c;
      s.addEventListener('click', () => {
        setColor(c);
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
        activeSwatch = i;
        // deactivate custom picker
        cpLabel.classList.remove('active');
      });
      colorRow.appendChild(s);
    });

    // Custom color picker
    const cpWrap = document.createElement('div');
    cpWrap.id = 'color-picker-wrap';
    const cpLabel = document.createElement('label');
    cpLabel.title = 'Custom color';
    const cpInput = document.createElement('input');
    cpInput.type = 'color';
    cpInput.value = color;
    cpInput.addEventListener('input', () => {
      setColor(cpInput.value);
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      cpLabel.classList.add('active');
    });
    cpLabel.appendChild(cpInput);
    cpWrap.appendChild(cpLabel);
    colorRow.appendChild(cpWrap);

    // Store reference
    colorRow._cpLabel = cpLabel;
  }

  function setColor(c) {
    color = c;
    // If eraser active, switch to pen
    if (tool === 'eraser') setTool('pen');
  }

  // ── Background Panel ──
  function buildBgGrid() {
    BG_COLORS.forEach((bg, i) => {
      const s = document.createElement('button');
      s.className = 'bg-swatch' + (i === 0 ? ' active' : '');
      s.style.background = bg.color;
      s.title = bg.label;
      s.addEventListener('click', () => {
        bgColor = bg.color;
        document.querySelectorAll('.bg-swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
        clearCanvas(false);
        bgPanel.classList.remove('open');
      });
      bgGrid.appendChild(s);
    });
  }

  // ── Tool Buttons ──
  function setTool(t) {
    tool = t;
    document.querySelectorAll('.tb-btn[data-tool]').forEach(b => {
      b.classList.toggle('active', b.dataset.tool === t);
    });
    // Update cursor style
    canvas.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
  }

  document.querySelectorAll('.tb-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => setTool(btn.dataset.tool));
  });

  // ── Size Slider ──
  sizeSlider.addEventListener('input', () => {
    brushSize = parseInt(sizeSlider.value);
    sizeVal.textContent = brushSize;
  });

  // ── Action Buttons ──
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);

  document.getElementById('btn-clear').addEventListener('click', () => {
    clearCanvas(true);
  });

  function clearCanvas(withConfirm) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    fillBg();
    saveState();
    showToast('Canvas cleared');
  }

  document.getElementById('btn-save').addEventListener('click', () => {
    // Create a temp canvas with bg
    const tmp = document.createElement('canvas');
    tmp.width  = canvas.width;
    tmp.height = canvas.height;
    const tc = tmp.getContext('2d');
    tc.fillStyle = bgColor;
    tc.fillRect(0, 0, tmp.width, tmp.height);
    tc.drawImage(canvas, 0, 0);

    const link = document.createElement('a');
    link.download = 'canvas-' + Date.now() + '.png';
    link.href = tmp.toDataURL('image/png');
    link.click();
    showToast('Saved as PNG ✓');
  });

  document.getElementById('btn-bg').addEventListener('click', e => {
    bgPanel.classList.toggle('open');
    e.stopPropagation();
  });
  document.addEventListener('pointerdown', e => {
    if (!bgPanel.contains(e.target) && e.target.id !== 'btn-bg') {
      bgPanel.classList.remove('open');
    }
  });

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if (e.metaKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    if (e.metaKey && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
    if (e.key === 'e') setTool('eraser');
    if (e.key === 'p') setTool('pen');
    if (e.key === 'b') setTool('brush');
    if (e.key === 'm') setTool('marker');
    if (e.key === 'c') setTool('pencil');
    if (e.key === '[') { brushSize = Math.max(1, brushSize - 2); sizeSlider.value = brushSize; sizeVal.textContent = brushSize; }
    if (e.key === ']') { brushSize = Math.min(80, brushSize + 2); sizeSlider.value = brushSize; sizeVal.textContent = brushSize; }
  });

  // ── Init ──
  buildPalette();
  buildBgGrid();
  initCanvas();

  window.addEventListener('resize', () => {
    // Preserve drawing on resize
    const tmpData = canvas.toDataURL();
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    fillBg();
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = tmpData;
  });

  // Prevent context menu on long press
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── Apple Pencil hover (pointerType pen, pressure 0) ──
  canvas.addEventListener('pointermove', e => {
    if (e.pointerType === 'pen' && e.pressure === 0) {
      statusText.textContent = 'Apple Pencil hovering';
    }
  });

  console.log('%cCanvas Drawing App', 'font-size:18px; color:#d4a853; font-family:serif');
  console.log('Shortcuts: P=Pen, C=Pencil, M=Marker, B=Brush, E=Eraser, [/]=Size, ⌘Z/⌘Y=Undo/Redo');
})();
</script>
</body>
</html>
