<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Studio">
  <meta name="description" content="Studio — Professional drawing app for iPad and Apple Pencil">
  <title>Studio — Drawing</title>

  <!-- App icons / PWA -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b0b0f'/><text y='.9em' font-size='80' x='10'>✏️</text></svg>">
  <meta name="theme-color" content="#0b0b0f">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ─── Splash Screen ─────────────────────────────── -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-logo">Studio</div>
      <div class="splash-sub">Professional Drawing</div>
      <div class="splash-loader"><div class="loader-bar"></div></div>
    </div>
  </div>

  <!-- ─── Top Bar ───────────────────────────────────── -->
  <header class="top-bar">
    <div class="top-left">
      <button class="btn-panel-toggle" id="toggle-tools" title="Toggle Tools (T)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="18" rx="1"/>
          <rect x="14" y="3" width="7" height="18" rx="1" opacity="0.35"/>
        </svg>
      </button>
      <div class="logo">Studio</div>
    </div>

    <div class="top-center">
      <button class="btn-icon" id="btn-undo" title="Undo (⌘Z)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9.5H16a5 5 0 010 10H10"/>
          <polyline points="7 5.5 3 9.5 7 13.5"/>
        </svg>
      </button>
      <button class="btn-icon" id="btn-redo" title="Redo (⌘⇧Z)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 9.5H8a5 5 0 000 10H14"/>
          <polyline points="17 5.5 21 9.5 17 13.5"/>
        </svg>
      </button>
      <div class="zoom-display" id="zoom-display">100%</div>
      <button class="btn-icon" id="btn-zoom-out" title="Zoom Out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="btn-icon" id="btn-zoom-fit" title="Fit to Screen (0)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      </button>
      <button class="btn-icon" id="btn-zoom-in" title="Zoom In">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
    </div>

    <div class="top-right">
      <button class="btn-icon" id="btn-grid" title="Toggle Grid">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="0.5"/>
          <rect x="14" y="3" width="7" height="7" rx="0.5"/>
          <rect x="14" y="14" width="7" height="7" rx="0.5"/>
          <rect x="3" y="14" width="7" height="7" rx="0.5"/>
        </svg>
      </button>
      <button class="btn-primary" id="btn-export">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
      <button class="btn-panel-toggle" id="toggle-layers" title="Toggle Layers">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="18" rx="1" opacity="0.35"/>
          <rect x="14" y="3" width="7" height="18" rx="1"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Main Layout ────────────────────────────────── -->
  <div class="app-layout" id="app-layout">

    <!-- Left Panel -->
    <aside class="panel panel-left" id="panel-left">
      <div class="panel-inner">

        <!-- Tools -->
        <section class="tool-section">
          <div class="section-label">Tools</div>
          <div class="tool-grid">

            <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
              </svg>
              <span>Pencil</span>
            </button>

            <button class="tool-btn" data-tool="pen" title="Ink Pen (N)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                <path d="M2 2l7.586 7.586"/>
                <circle cx="11" cy="11" r="2"/>
              </svg>
              <span>Pen</span>
            </button>

            <button class="tool-btn" data-tool="brush" title="Brush (B)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 114.03 4.03l-8.06 8.08"/>
                <path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1 1 2.48 1 3.5 1 1.66 0 3-1.35 3-3.02 0-1.67-1.35-3.02-3-3.02z"/>
              </svg>
              <span>Brush</span>
            </button>

            <button class="tool-btn" data-tool="marker" title="Marker (M)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="8" y="2" width="8" height="14" rx="2"/>
                <path d="M12 16v6"/>
                <path d="M10 22h4"/>
              </svg>
              <span>Marker</span>
            </button>

            <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/>
                <path d="M6.5 17.5l5-5"/>
              </svg>
              <span>Eraser</span>
            </button>

            <button class="tool-btn" data-tool="fill" title="Fill (G)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 11l-8-8-8.5 8.5a5.5 5.5 0 007.78 7.78L19 11z"/>
                <path d="M20 16.2c0 0 1.5 1.67 1.5 2.5a1.5 1.5 0 01-3 0c0-.83 1.5-2.5 1.5-2.5z"/>
              </svg>
              <span>Fill</span>
            </button>

            <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M2 22l1-1h3l9-9"/>
                <path d="M3 21v-3l9-9"/>
                <path d="M15 6l3.4-3.4a2.1 2.1 0 012.96 2.96L18 9l2 2-4 4-2-2"/>
              </svg>
              <span>Pick</span>
            </button>

            <button class="tool-btn" data-tool="move" title="Pan/Move (V)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <polyline points="5 9 2 12 5 15"/>
                <polyline points="9 5 12 2 15 5"/>
                <polyline points="15 19 12 22 9 19"/>
                <polyline points="19 9 22 12 19 15"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <line x1="12" y1="2" x2="12" y2="22"/>
              </svg>
              <span>Move</span>
            </button>

          </div>
        </section>

        <!-- Brush Settings -->
        <section class="brush-section">
          <div class="section-label">Brush</div>

          <div class="slider-group">
            <div class="slider-header">
              <span>Size</span>
              <span class="slider-value" id="size-value">8</span>
            </div>
            <input type="range" class="slider" id="brush-size" min="1" max="300" value="8">
          </div>

          <div class="slider-group">
            <div class="slider-header">
              <span>Opacity</span>
              <span class="slider-value" id="opacity-value">100%</span>
            </div>
            <input type="range" class="slider" id="brush-opacity" min="1" max="100" value="100">
          </div>

          <div class="slider-group">
            <div class="slider-header">
              <span>Hardness</span>
              <span class="slider-value" id="hardness-value">88%</span>
            </div>
            <input type="range" class="slider" id="brush-hardness" min="0" max="100" value="88">
          </div>

          <div class="pressure-controls">
            <div class="section-label" style="padding-top: 10px;">Pressure</div>
            <div class="pressure-row">
              <button class="pressure-btn active" id="pressure-size">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" opacity="0.4"/>
                </svg>
                Size
              </button>
              <button class="pressure-btn" id="pressure-opacity">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="9"/><path d="M12 3v18" opacity="0.4"/>
                </svg>
                Opacity
              </button>
            </div>
          </div>
        </section>

        <!-- Color -->
        <section class="color-section">
          <div class="section-label">Color</div>
          <div class="color-swatches" id="color-swatches"></div>
          <div class="color-main" id="open-color-picker">
            <div class="color-preview" id="color-preview" style="background:#1a1a2e"></div>
            <div class="color-hex" id="color-hex">#1A1A2E</div>
          </div>
        </section>

      </div>
    </aside>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvas-area">
      <div class="canvas-viewport" id="canvas-viewport">
        <div class="canvas-container" id="canvas-container">
          <!-- display-canvas injected by JS here -->
          <canvas id="overlay-canvas" style="touch-action:none"></canvas>
          <canvas id="cursor-canvas"></canvas>
        </div>
      </div>
      <div class="gesture-hint" id="gesture-hint">
        <span>✦ Pinch to zoom · Two fingers to pan · 3-finger tap to undo</span>
      </div>
    </div>

    <!-- Right Panel: Layers -->
    <aside class="panel panel-right" id="panel-right">
      <div class="panel-inner">

        <!-- Layers -->
        <section class="layers-section">
          <div class="section-header">
            <div class="section-label">Layers</div>
            <div class="layer-actions">
              <button class="btn-icon-sm" id="btn-add-layer" title="New Layer">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
              <button class="btn-icon-sm" id="btn-dup-layer" title="Duplicate Layer">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
              </button>
              <button class="btn-icon-sm" id="btn-merge-layer" title="Merge Down">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="12 8 12 16"/><polyline points="8 13 12 17 16 13"/>
                  <rect x="3" y="3" width="18" height="18" rx="2" opacity="0.4"/>
                </svg>
              </button>
              <button class="btn-icon-sm" id="btn-delete-layer" title="Delete Layer">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="layers-list" id="layers-list"></div>
        </section>

        <!-- Layer Properties -->
        <section class="layer-props">
          <div class="section-label">Layer</div>
          <div class="slider-group">
            <div class="slider-header">
              <span>Opacity</span>
              <span class="slider-value" id="layer-opacity-value">100%</span>
            </div>
            <input type="range" class="slider" id="layer-opacity" min="0" max="100" value="100">
          </div>
          <div class="blend-mode-row">
            <span>Blend</span>
            <select class="blend-select" id="layer-blend">
              <option value="source-over">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="darken">Darken</option>
              <option value="lighten">Lighten</option>
              <option value="color-dodge">Color Dodge</option>
              <option value="color-burn">Color Burn</option>
              <option value="hard-light">Hard Light</option>
              <option value="soft-light">Soft Light</option>
              <option value="difference">Difference</option>
              <option value="exclusion">Exclusion</option>
              <option value="hue">Hue</option>
              <option value="saturation">Saturation</option>
              <option value="color">Color</option>
              <option value="luminosity">Luminosity</option>
            </select>
          </div>
        </section>

        <!-- Canvas Settings -->
        <section>
          <div class="section-label">Canvas</div>
          <div class="canvas-size-row">
            <div class="canvas-size-inputs">
              <div class="size-field">
                <label>W</label>
                <input type="number" id="canvas-width" value="2732" min="100" max="8000">
              </div>
              <div class="size-field">
                <label>H</label>
                <input type="number" id="canvas-height" value="2048" min="100" max="8000">
              </div>
            </div>
            <button class="btn-sm" id="btn-resize">Resize</button>
          </div>
          <div class="preset-sizes">
            <button class="preset-btn" data-size="2732x2048">iPad Pro</button>
            <button class="preset-btn" data-size="2048x2048">Square</button>
            <button class="preset-btn" data-size="3840x2160">4K</button>
            <button class="preset-btn" data-size="1920x1080">FHD</button>
          </div>
          <div class="canvas-bg-row">
            <span>Background</span>
            <div class="bg-options">
              <button class="bg-btn active" data-bg="white" title="White">
                <div style="background:white;border:1px solid rgba(0,0,0,0.1)"></div>
              </button>
              <button class="bg-btn" data-bg="transparent" title="Transparent">
                <div class="checkerboard"></div>
              </button>
              <button class="bg-btn" data-bg="black" title="Black">
                <div style="background:#111"></div>
              </button>
            </div>
          </div>
        </section>

      </div>
    </aside>

  </div><!-- end .app-layout -->

  <!-- ─── Color Picker Modal ─────────────────────────── -->
  <div class="modal-overlay" id="color-picker-overlay">
    <div class="color-picker-modal">
      <div class="modal-header">
        <span class="modal-title">Color Picker</span>
        <button class="modal-close" id="close-color-picker">×</button>
      </div>

      <!-- SL Gradient -->
      <div class="sl-container">
        <canvas id="sl-canvas" width="260" height="180"></canvas>
        <div class="sl-thumb" id="sl-thumb"></div>
      </div>

      <!-- Hue Strip -->
      <div class="hue-container">
        <canvas id="hue-canvas" width="260" height="16"></canvas>
        <div class="hue-thumb" id="hue-thumb"></div>
      </div>

      <!-- Preview + Hex input -->
      <div class="picker-bottom">
        <div id="picker-preview" style="width:36px;height:36px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);flex-shrink:0;background:#1a1a2e"></div>
        <div class="hex-input-wrap">
          <input type="text" id="hex-input" value="#1a1a2e" maxlength="7" spellcheck="false">
        </div>
      </div>

      <!-- Recent colors -->
      <div class="picker-recent-label">Recent</div>
      <div id="picker-recent"></div>
    </div>
  </div>

  <!-- ─── Export Modal ───────────────────────────────── -->
  <div class="modal-overlay" id="export-overlay">
    <div class="export-modal">
      <div class="modal-header">
        <span class="modal-title">Export</span>
        <button class="modal-close" id="close-export">×</button>
      </div>
      <div class="export-options">
        <button class="export-btn" id="export-png">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9l4-4 4 4 4-4 4 4"/>
            <path d="M3 15l4 4 4-4 4 4 4-4"/>
          </svg>
          PNG
          <span>Full quality · supports transparency</span>
        </button>
        <button class="export-btn" id="export-jpg">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          JPEG
          <span>Smaller file · white background</span>
        </button>
        <button class="export-btn" id="export-copy">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copy PNG
          <span>Copy to clipboard</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/canvas-engine.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
